events {}
http {
    resolver 127.0.0.11 valid=5s;
    # --- BẮT ĐẦU PHẦN YÊU CẦU MỞ RỘNG 10: LOAD BALANCER ---
    # Định nghĩa cụm server cho thuật toán Round Robin
    upstream lb_cluster {
        server web-frontend-server1:80;
        server web-frontend-server2:80;
    }
    # --- KẾT THÚC PHẦN MỞ RỘNG 10 ---

    server {
        listen 80;


        # Route /lba → Round Robin giữa server1 và server2
        location ^~ /lba/ {
            proxy_pass http://lb_cluster/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            add_header X-LB-Test "Success-Node" always;
            add_header Cache-Control "no-store, no-cache, must-revalidate, max-age=0";
        }

        # Redirect /lba (không có dấu /) → /lba/ để tránh lỗi 404
        location = /lba {
            return 301 /lba/;
        }
        # --- KẾT THÚC MỞ RỘNG 10 ---

        # 1. Web tĩnh (Trang chủ chính)
        location / {
            proxy_pass http://web-frontend-server:80;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # 2. App API (strip /api/)
        location /api/ {
            proxy_pass http://application-backend-server:8081/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # 3. Keycloak
        location /auth/ {
            proxy_pass http://authentication-identity-server:8080/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # --- PHẦN YÊU CẦU MỞ RỘNG 9 ---
        location /student/ {
            proxy_pass http://application-backend-server:8081/student;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }
    }
}