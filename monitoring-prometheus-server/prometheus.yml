global:
  scrape_interval: 5s

scrape_configs:
  - job_name: 'prometheus'
    static_configs:
      - targets: ['monitoring-prometheus-server:9090']

  - job_name: 'node-exporter'
    static_configs:
      - targets: ['monitoring-node-exporter-server:9100']

  - job_name: 'web'
    metrics_path: '/metrics'
    static_configs:
      - targets: ['web-frontend-server:80']
